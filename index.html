<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Textura Architects</title>

  <!-- =============================================
       ШРИФТЫ — подключаем через Google Fonts
       Cormorant Garamond — заголовки (элегантный серифный)
       Jost — основной текст (современный гротеск)
       Чтобы сменить шрифт — замени название ниже
  ============================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       ЦВЕТА И ПЕРЕМЕННЫЕ
       Чтобы сменить цветовую схему — меняй значения здесь
    ============================================= */
    :root {
      --bg: #0e0e0e;           /* основной фон — почти чёрный */
      --bg-card: #161616;      /* фон карточек */
      --bg-card-hover: #1e1e1e;
      --text: #f0ebe3;         /* основной текст — тёплый белый */
      --text-muted: #7a756e;   /* второстепенный текст — серый */
      --accent: #c9a96e;       /* акцентный цвет — золото */
      --border: #2a2a2a;       /* цвет границ */
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Jost', sans-serif;
    }

    /* =============================================
       СБРОС И БАЗОВЫЕ СТИЛИ
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Контейнер — ограничивает ширину по центру */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Разделитель секций */
    .section { padding: 100px 0; }

    /* Заголовок секции */
    .section-label {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    /* Большой заголовок */
    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 300;
      line-height: 1.15;
      margin-bottom: 2rem;
    }

    /* Тонкая горизонтальная линия */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* Кнопка */
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      background: transparent;
      transition: background 0.3s, color 0.3s;
    }
    .btn:hover { background: var(--accent); color: var(--bg); }



    /* =============================================
       ВСПЛЫВАЮЩЕЕ ОКНО (ПОПАП)
    ============================================= */

    /* Затемнённый фон за попапом */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    /* Класс .open делает попап видимым */
    .popup-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* Само окно */
    .popup-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      max-width: 520px;
      width: 100%;
      padding: 3rem;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.35s ease;
    }
    .popup-overlay.open .popup-box { transform: translateY(0); }

    /* Кнопка закрытия × */
    .popup-close {
      position: absolute;
      top: 1.25rem; right: 1.25rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .popup-close:hover { color: var(--text); }

    .popup-title {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }
    .popup-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* =============================================
       НАВИГАЦИЯ
    ============================================= */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(14, 14, 14, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }

    /* Логотип */
    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }

    /* Список ссылок в меню */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    /* Переключатель языков */
    .lang-switcher {
      display: flex;
      gap: 0.5rem;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 6px;
      transition: color 0.2s;
    }
    .lang-btn:hover,
    .lang-btn.active { color: var(--accent); }

    /* Бургер-кнопка для мобильных */
    .nav-burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .nav-burger span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: all 0.3s;
    }

    /* =============================================
       HERO — главный экран
    ============================================= */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      padding-bottom: 100px;
      padding-top: 120px;
      position: relative;
      overflow: hidden;
    }

    /* Фоновое изображение hero
       ЗАМЕНИ url('...') на ссылку на своё фото */
    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=1600') center/cover no-repeat;
      opacity: 0.18; /* прозрачность фото — меняй от 0 до 1 */
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    /* Маленькая подпись над заголовком */
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--accent);
    }

    /* Главный заголовок */
    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 300;
      line-height: 1.05;
      margin-bottom: 2rem;
    }

    /* Подзаголовок / слоган
       ЗАМЕНИ текст на свой */
    .hero-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-muted);
      max-width: 480px;
      margin-bottom: 3rem;
      line-height: 1.8;
    }

    /* Счётчики статистики */
    .hero-stats {
      display: flex;
      gap: 3rem;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .stat-number {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--accent);
      display: block;
    }
    .stat-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* =============================================
       О НАС
    ============================================= */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    /* Изображение в секции "о нас"
       ЗАМЕНИ url('...') на своё фото */
    .about-img {
      aspect-ratio: 3/4;
      background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=800') center/cover;
      position: relative;
    }
    /* Рамка-акцент вокруг фото */
    .about-img::after {
      content: '';
      position: absolute;
      inset: -16px -16px 16px 16px;
      border: 1px solid var(--border);
      z-index: -1;
    }

    .about-text p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-size: 15px;
    }

    /* =============================================
       УСЛУГИ
    ============================================= */
    .services { background: var(--bg-card); }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border);
      margin-top: 3rem;
    }

    .service-card {
      padding: 2.5rem 2rem;
      border-right: 1px solid var(--border);
      transition: background 0.3s;
    }
    .service-card:last-child { border-right: none; }
    .service-card:hover { background: var(--bg-card-hover); }

    /* Номер услуги */
    .service-num {
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 300;
      color: var(--border);
      display: block;
      margin-bottom: 1.5rem;
      transition: color 0.3s;
    }
    .service-card:hover .service-num { color: var(--accent); }

    .service-title {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }
    .service-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* =============================================
       ПОРТФОЛИО
    ============================================= */
    .portfolio-grid {
      display: grid;
      /* Сетка: 2 колонки, неравные */
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      gap: 1.5rem;
      margin-top: 3rem;
    }

    /* Большая карточка — занимает 2 строки слева */
    .portfolio-item { position: relative; overflow: hidden; cursor: pointer; display: block; text-decoration: none; color: inherit; }
    .portfolio-item:first-child { grid-row: span 2; }

    /* Фото проекта — ЗАМЕНИ url('...') на свои */
    .portfolio-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
      background: var(--bg-card);
    }
    .portfolio-item:first-child .portfolio-img { aspect-ratio: 3/4; height: 100%; }
    .portfolio-item:hover .portfolio-img { transform: scale(1.04); }

    /* Подпись на карточке */
    .portfolio-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2rem 1.5rem 1.5rem;
      background: linear-gradient(transparent, rgba(14,14,14,0.9));
      transform: translateY(8px);
      transition: transform 0.3s;
    }
    .portfolio-item:hover .portfolio-info { transform: translateY(0); }
    .portfolio-info h3 {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 400;
    }
    .portfolio-info span {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* =============================================
       ПРОЦЕСС РАБОТЫ
    ============================================= */
    .process { background: var(--bg-card); }

    .process-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    .step {
      padding: 2.5rem 2rem 2.5rem 0;
      border-right: 1px solid var(--border);
    }
    .step:last-child { border-right: none; }

    .step-num {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 1rem;
      display: block;
    }
    .step-title {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }
    .step-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* =============================================
       ФОРМА ЗАЯВКИ
    ============================================= */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }

    .contact-info p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 2.5rem;
    }

    /* Контактные данные
       ЗАМЕНИ на реальные */
    .contact-detail {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 1.5rem;
    }
    .contact-detail-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .contact-detail-value {
      font-size: 15px;
      color: var(--text);
    }

    /* Поля формы */
    .form-group { margin-bottom: 1.5rem; }
    .form-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      padding: 10px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { border-color: var(--accent); }
    .form-select { cursor: pointer; }
    /* Убираем стандартный вид select в некоторых браузерах */
    .form-select option { background: var(--bg); }
    .form-textarea { resize: none; height: 100px; }

    /* =============================================
       ФУТЕР
    ============================================= */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 0;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 400;
    }
    .footer-copy {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Ссылки на соцсети
       ЗАМЕНИ href на реальные ссылки */
    .footer-socials {
      display: flex;
      gap: 1.5rem;
    }
    .footer-socials a {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-socials a:hover { color: var(--accent); }

    /* =============================================
       АНИМАЦИЯ ПРИ СКРОЛЛЕ
       Элементы с классом .fade-in появляются при прокрутке
    ============================================= */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* =============================================
       АДАПТИВ ДЛЯ МОБИЛЬНЫХ
    ============================================= */
    @media (max-width: 900px) {
      .about-grid,
      .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      .about-img { aspect-ratio: 16/9; }

      .services-grid,
      .process-steps { grid-template-columns: 1fr 1fr; }
      .service-card { border-right: none; border-bottom: 1px solid var(--border); }
      .service-card:last-child { border-bottom: none; }
      .step { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; }
      .step:last-child { border-bottom: none; }

      .portfolio-grid { grid-template-columns: 1fr; }
      .portfolio-item:first-child { grid-row: span 1; }
      .portfolio-item:first-child .portfolio-img { aspect-ratio: 4/3; height: auto; }

      .nav-links { display: none; flex-direction: column; gap: 1.5rem; position: absolute;
        top: 100%; left: 0; right: 0; background: var(--bg); padding: 2rem; border-bottom: 1px solid var(--border); }
      .nav-links.open { display: flex; }
      .nav-burger { display: flex; }

      .hero-stats { gap: 2rem; flex-wrap: wrap; }
      .footer-inner { flex-direction: column; gap: 1.5rem; text-align: center; }
    }

    @media (max-width: 600px) {
      .services-grid,
      .process-steps { grid-template-columns: 1fr; }
      .section { padding: 60px 0; }
      .container { padding: 0 1.25rem; }
    }
  </style>
</head>

<body>

  <!-- =============================================
       ВСПЛЫВАЮЩЕЕ ОКНО С ФОРМОЙ ЗАЯВКИ
       Открывается автоматически (3 сек) и при бездействии (10 сек)
       Также открывается кнопкой в навигации
  ============================================= -->
  <div class="popup-overlay" id="popup" onclick="handleOverlayClick(event)">
    <div class="popup-box">
      <!-- Кнопка закрытия -->
      <button class="popup-close" onclick="closePopup()">×</button>

      <h2 class="popup-title" data-i18n="popup_title"></h2>
      <p class="popup-sub" data-i18n="popup_sub"></p>

      <form id="popup-form" onsubmit="submitPopupForm(event)">

        <div class="form-group">
          <label class="form-label" data-i18n="form_name"></label>
          <input class="form-input" type="text" id="popup-name" required />
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="form_phone"></label>
          <input class="form-input" type="tel" id="popup-phone" />
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="form_service"></label>
          <select class="form-select" id="popup-service">
            <option data-i18n="s1_title"></option>
            <option data-i18n="s2_title"></option>
            <option data-i18n="s3_title"></option>
            <option data-i18n="s4_title"></option>
          </select>
        </div>

        <button type="submit" class="btn" style="width:100%; text-align:center;" data-i18n="form_submit"></button>
        <p id="popup-success" style="display:none; margin-top:1rem; color:var(--accent); font-size:13px; text-align:center;" data-i18n="form_success"></p>

      </form>
    </div>
  </div>


  <!-- НАВИГАЦИЯ -->
  <nav class="nav">
    <a href="#" class="nav-logo">Textura Architects</a>

    <ul class="nav-links" id="nav-links">
      <li><a href="#about"    data-i18n="nav_about"></a></li>
      <li><a href="#services" data-i18n="nav_services"></a></li>
      <li><a href="#portfolio" data-i18n="nav_portfolio"></a></li>
      <li><a href="#process"  data-i18n="nav_process"></a></li>
      <li><a href="#contact"  data-i18n="nav_contact"></a></li>
    </ul>

    <div style="display:flex; align-items:center; gap:1.5rem;">
      <!-- Кнопка "Оставить заявку" в шапке — открывает попап -->
      <button class="btn" onclick="openPopup()" data-i18n="hero_cta"
        style="padding:10px 22px; font-size:11px;"></button>

      <!-- Переключатель языков -->
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('pl')">PL</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>

      <!-- Бургер для мобильных -->
      <button class="nav-burger" id="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>


  <!-- =============================================
       HERO
       ЗАМЕНИ текст слогана в объекте translations ниже
  ============================================= -->
  <section class="hero" id="home">
    <div class="hero-bg"></div>
    <div class="container">
      <div class="hero-content">
        <p class="hero-eyebrow" data-i18n="hero_eyebrow"></p>
        <h1 class="hero-title">Textura<br>Architects</h1>
        <p class="hero-sub" data-i18n="hero_sub"></p>
        <a href="#contact" class="btn" data-i18n="hero_cta"></a>

        <!-- Цифры — ЗАМЕНИ на свои -->
        <div class="hero-stats">
          <div>
            <span class="stat-number">50+</span>
            <span class="stat-label" data-i18n="stat_projects"></span>
          </div>

          en: 'An apartment in central Warsaw. The goal was to create a calm, light-filled space with no superfluous detail. Built around a neutral palette, natural materials and carefully considered lighting.',

      {
        cover:   'images/p2-cover.jpg',

        desc: {
          ru: 'Загородный дом под Краковом. Сочетание классических пропорций с современными материалами — мрамор, тёмное дерево, латунь. Акцент на деталях: карнизы, встроенная мебель, авторские светильники.',
          pl: 'Dom pod Krakowem. Klasyczne proporcje i nowoczesne materiały — marmur, ciemne drewno, mosiądz. Nacisk na detale: gzymsy, meble na wymiar, autorskie lampy.',
          en: 'A house near Kraków. Classical proportions meet contemporary materials — marble, dark wood, brass. The emphasis is on details: cornicing, bespoke joinery and custom lighting.',

      // ══════════════════════════════════════════════════════════════

      //   cover:   'images/p4-cover.jpg',

    // =============================================
    // 3. АНИМАЦИЯ ПРИ СКРОЛЛЕ
    // Определяем ЗДЕСЬ — до renderPortfolio, которая его использует
    // =============================================
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));


    // =============================================
    // 4. ФУНКЦИИ
    // =============================================
    let currentLang = 'ru';

    // Генерирует HTML карточек портфолио из массива PORTFOLIO выше
    function renderPortfolio() {
      const grid = document.getElementById('portfolio-grid');
      if (!grid) return;
      grid.innerHTML = PORTFOLIO.map((p, i) => {
        const big = i === 0 ? 'style="grid-row:span 2"' : '';
        return `
          <a class="portfolio-item fade-in" href="project.html?id=${i}" ${big}>
            <img class="portfolio-img"
              src="${p.cover}"
              alt="${p.title.ru}"
              onerror="this.style.cssText='background:#1e1e1e;display:block;width:100%;height:100%';this.removeAttribute('src')"
            />
            <div class="portfolio-info">
              <span>${p.style[currentLang] || p.style.ru}</span>
              <h3>${p.title[currentLang] || p.title.ru}</h3>
            </div>
          </a>`;
      }).join('');
      grid.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    }

    // Применяет переводы и перерисовывает портфолио
    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
      });
      document.documentElement.lang = lang;
      renderPortfolio(); // перерисовываем с текстами нового языка
    }

    function toggleMenu() {
      document.getElementById('nav-links').classList.toggle('open');
    }


    // =============================================
    // 5. ИНИЦИАЛИЗАЦИЯ — вызовы при загрузке страницы
    // =============================================
    setLang('ru'); // применяем язык + рендерим портфолио

    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('nav-links').classList.remove('open');
      });
    });


    // =============================================
    // 6. ПОПАП
    // =============================================

    // Вспомогательная функция: попап сейчас открыт?
    function isPopupOpen() {
      return document.getElementById('popup').classList.contains('open');
    }

    function openPopup() {
      if (isPopupOpen()) return; // уже открыт — ничего не делаем
      document.getElementById('popup').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePopup() {
      document.getElementById('popup').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target.id === 'popup') closePopup();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closePopup();
    });

    // Автооткрытие через 3 секунды после загрузки (один раз)
    setTimeout(() => openPopup(), 3000);

    // Автооткрытие после 10 секунд без активности пользователя.
    // Срабатывает каждый раз когда пользователь 10 сек ничего не делает.
    let inactivityTimer = null;

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        openPopup(); // откроет только если попап сейчас закрыт
      }, 10000); // ← 10000 мс = 10 секунд
    }

    ['mousemove', 'keydown', 'scroll', 'click', 'touchstart'].forEach(evt => {
      document.addEventListener(evt, resetInactivityTimer, { passive: true });
    });
    resetInactivityTimer(); // запускаем таймер сразу при загрузке


    // =============================================
    // 7. ОТПРАВКА ФОРМ — через Telegram Bot
    //
    // Как настроить (~5 минут):
    //   1. Напиши @BotFather в Telegram → /newbot → получи токен
    //   2. Напиши своему боту любое сообщение (активирует чат)
    //   3. Открой: https://api.telegram.org/bot<токен>/getUpdates
    //      Найди "id" внутри "chat" — это CHAT_ID
    //   4. Вставь значения в BOT_TOKEN и CHAT_ID ниже
    // =============================================
    const BOT_TOKEN = '8204722018:AAHetftLFwyHkYTMCCyKf-IyduN3KEb3gHs';   // ← заменить
    const CHAT_ID   = '-5158719328'; // ← заменить

    async function sendToTelegram(text) {
      if (BOT_TOKEN.includes('ВСТАВЬ')) {
        console.log('[Telegram не настроен] Данные:', text);
        return true; // имитируем успех чтобы показать сообщение
      }
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text, parse_mode: 'HTML' }),
        });
        return res.ok;
      } catch (err) {
        console.error('Ошибка Telegram:', err);
        return false;
      }
    }

    // Форма в ПОПАПЕ
    async function submitPopupForm(e) {
      e.preventDefault();
      const name    = document.getElementById('popup-name').value;
      const phone   = document.getElementById('popup-phone').value;
      const service = document.getElementById('popup-service').value;
      await sendToTelegram(`📋 <b>Заявка (попап)</b>\n👤 ${name}\n📞 ${phone}\n🏠 ${service}`);
      document.getElementById('popup-success').style.display = 'block';
      document.getElementById('popup-form').reset();
      setTimeout(() => closePopup(), 2500);
    }

    // Форма ВНИЗУ СТРАНИЦЫ (секция "Контакты")
    async function submitForm(e) {
      e.preventDefault();
      const fields  = e.target.querySelectorAll('.form-input, .form-select, .form-textarea');
      const name    = fields[0].value;
      const email   = fields[1].value;
      const phone   = fields[2].value;
      const service = fields[3].value;
      const message = fields[4].value;
      await sendToTelegram(`📋 <b>Заявка (сайт)</b>\n👤 ${name}\n📧 ${email}\n📞 ${phone}\n🏠 ${service}\n💬 ${message}`);
      const success = document.getElementById('form-success');
      success.style.display = 'block';
      e.target.reset();
      setTimeout(() => { success.style.display = 'none'; }, 5000);
    }

  </script>
